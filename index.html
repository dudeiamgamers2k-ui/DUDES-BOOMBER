<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUDES PANEL - Unlimited Bomber</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .bomber-box { border: 1px solid #0f0; padding: 30px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 0 15px #0f0; }
        h2 { color: #0f0; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: #0f0; text-align: center; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .footer { margin-top: 20px; font-size: 10px; color: #555; }
    </style>
</head>
<body>
    <div class="bomber-box">
        <h2>Unlimited Bomber</h2>
        <p style="font-size: 12px;">Enter Number:</p>
        <input type="text" id="phone" placeholder="e.g. 017XXXXXXXX">
        <p style="font-size: 12px;">Amount:</p>
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="startBomber()">Start</button>
        <div class="footer">© Developed by Dudes</div>
    </div>

    <script>
        function startBomber() {
            let num = document.getElementById('phone').value;
            if(num == "") {
                alert("Please enter a number!");
            } else {
                alert("Bomber Started on: " + num + "\n(Note: API connection required for actual bombing)");
            }
        }
    </script>
</body>
</html>
